name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts
        # --ignore-scripts skips electron-builder's postinstall, which tries to
        # rebuild native modules (cpu-features) that aren't needed for tests.

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Coverage report (job summary + PR comment) 
        uses: davelosert/vitest-coverage-report-action@v2
